<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Ready — Decoder Atlas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .success-box { text-align: center; padding: 60px 20px; max-width: 600px; margin: 0 auto; }
    .success-box h1 { color: #8deb00; font-family: 'Space Mono', monospace; font-size: 28px; margin-bottom: 10px; }
    .success-box h2 { color: #ffffff; font-size: 16px; font-weight: 400; margin-bottom: 10px; }
    .success-box p { color: #b4b4b4; font-size: 14px; }
    #downloadBtn { display: inline-block; margin-top: 30px; padding: 14px 40px; border: 1px solid #8deb00; color: #8deb00; background: transparent; border-radius: 30px; text-decoration: none; font-family: 'Space Mono', monospace; font-size: 14px; transition: 0.2s; }
    #downloadBtn:hover { background: #8deb00; color: #000; }
  </style>
</head>
<body>
<div class="main-wrapper" style="display:flex; align-items:center; min-height:80vh;">
  <div class="success-box">
    <h1>📡 Signal Received.</h1>
    <h2 id="cameraLabel">Your download is starting...</h2>
    <p style="margin-top:10px;">If the download doesn't start automatically, click the button below.</p>
    
    <a id="downloadBtn" href="#" onclick="triggerDownload()">⬇️ Download Your PDF</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pdf = params.get('pdf');
  const cameraModel = params.get('camera_model') || 'Snapshot Card';

  // If the camera model is available, show it
  if(cameraModel && cameraModel !== '{camera_model}') {
    document.getElementById('cameraLabel').innerText = `"${decodeURIComponent(cameraModel)}" is ready.`;
  } else {
    document.getElementById('cameraLabel').innerText = `Your download is ready.`;
  }

  // If we have a real PDF link, enable the button to open it
  if(pdf && pdf !== '{pdf_url}') {
    document.getElementById('downloadBtn').href = decodeURIComponent(pdf);
    document.getElementById('downloadBtn').innerText = '⬇️ Download Your PDF';
    // PREVENT THE AUTO-404: We removed the setTimeout that auto-opened the PDF.
  } else {
    document.getElementById('cameraLabel').innerText = "File is ready. Click the button below.";
  }

  function triggerDownload() {
    if(!pdf || pdf === '{pdf_url}') return;
    document.getElementById('downloadBtn').innerText = "Downloading...";
    window.open(decodeURIComponent(pdf), '_blank');
  }
</script>
</body>
</html>
