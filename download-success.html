<script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    let cardKey = urlParams.get('card');
    const btn = document.getElementById('downloadBtn');

    if (cardKey) {
      cardKey = cardKey.toLowerCase().trim();

      // --- MASTER ASSET MAP (Using raw GitHub URLs) ---
      const pdfMap = {
        "sony-a7iv": "https://raw.githubusercontent.com/CamerasDecoded/camerasdecoded-settings/main/cards/sony-a7iv-portrait-bright-natural-card.pdf"
        // Remaining 198 will go here
      };

      const pdfUrl = pdfMap[cardKey];

      if (pdfUrl) {
        if (btn) btn.innerText = '⬇️ Download Your PDF';

        const executeDownload = () => {
          const link = document.createElement('a');
          link.href = pdfUrl;
          link.download = pdfUrl.split('/').pop();
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        setTimeout(executeDownload, 1500); // Auto-download
        if (btn) btn.onclick = (e) => { e.preventDefault(); executeDownload(); };
      } else {
        if (btn) {
          btn.innerText = 'Return to Atlas';
          btn.onclick = () => { window.location.href = 'index.html'; };
        }
        console.warn("No asset for key: " + cardKey);
      }
    } else {
      if (btn) {
        btn.innerText = 'Return to Atlas';
        btn.onclick = () => { window.location.href = 'index.html'; };
      }
    }
  });
</script>
