<script>
  const params = new URLSearchParams(window.location.search);
  let camera = params.get('camera_model');

  // --- THE WORKAROUND: If Tally sends the literal placeholder, force it to Sony ---
  if (camera === '{camera_model}') {
    camera = 'Sony A7IV Portrait Bright Natural';
  }

  // --- THE MASTER MAP ---
  const pdfMap = {
    "Sony A7IV Portrait Bright Natural": "cards/sony-a7iv-portrait-bright-natural-card.pdf"
    // We will add the other 198 cards here later
  };

  if (camera && pdfMap[camera]) {
    document.getElementById('downloadBtn').innerText = '⬇️ Download Your PDF';
    
    // Auto-open the PDF after 2 seconds
    setTimeout(() => {
      window.open(pdfMap[camera], '_blank');
    }, 2000);

    // Make the button clickable too
    document.getElementById('downloadBtn').onclick = function() {
      window.open(pdfMap[camera], '_blank');
    };
  } else {
    document.getElementById('downloadBtn').innerText = 'Return to Atlas';
    document.getElementById('downloadBtn').onclick = function() {
      window.location.href = 'index.html';
    };
  }
</script>
