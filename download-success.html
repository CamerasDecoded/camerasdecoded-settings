<script>
  // --- 1. Get the referring page path ---
  let path = '';
  try {
    const referrer = document.referrer;
    if (referrer) {
      const url = new URL(referrer);
      path = url.pathname.toLowerCase(); // forces lowercase to avoid case mismatch
    }
  } catch (e) { /* ignore */ }

  // --- 2. Asset map (keys must match the URL path) ---
  const pdfMap = {
    "/sony-a7iv-portrait-bright-natural": "cards/sony-a7iv-portrait-bright-natural-card.pdf"
    // We'll add the other 198 cards here later
  };

  // --- 3. Find and trigger the download ---
  const pdf = pdfMap[path];
  const btn = document.getElementById('downloadBtn');

  if (pdf) {
    btn.innerText = '⬇️ Download Your PDF';
    // Auto‑download after 1.5 seconds
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = pdf;
      link.download = pdf.split('/').pop(); // forces a download, not a preview
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 1500);
    // Also make the button work if the auto‑download fails
    btn.onclick = function() {
      const link = document.createElement('a');
      link.href = pdf;
      link.download = pdf.split('/').pop();
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };
  } else {
    btn.innerText = 'Return to Atlas';
    btn.onclick = function() { window.location.href = 'index.html'; };
  }
</script>
