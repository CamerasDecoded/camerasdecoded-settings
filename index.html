      font-size: 14px;

      margin-bottom: 40px;

      position: absolute;
      top: 0;
      left: 0;
      width: 2px;

      border-top: 2px solid #8deb00;
      border-radius: 6px 0 0 0;

      content: "";
      position: absolute;
      top: -4px;
      left: 8px;
      width: 6px;
      height: 6px;
      background: #8deb00;
      border-radius: 50%;
      box-shadow: 0 0 8px #8deb00;

      { camera: "Sony A6700", scenario: "Real Estate", lighting: "Bright Natural", slug: "sony-a6700-real-estate-bright-natural", difficulty: "Beginner" },
      { camera: "Sony A6700", scenario: "Real Estate", lighting: "Golden Hour", slug: "sony-a6700-real-estate-golden-hour", difficulty: "Beginner" },

      { camera: "Sony A6700", scenario: "Real Estate", lighting: "Low Light", slug: "sony-a6700-real-estate-low-light", difficulty: "Intermediate" },
      { camera: "Sony A6700", scenario: "Real Estate", lighting: "Overcast", slug: "sony-a6700-real-estate-overcast", difficulty: "Beginner" }
    ];

    function renderArticles(filtered) {
      const grid = document.getElementById('articleGrid');
      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.innerHTML = '<p style="color:#b4b4b4; grid-column: 1/-1; text-align:center; padding:40px 0;">No matching articles found.</p>';
        return;
      }
      filtered.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.innerHTML = `
          <a href="${article.slug}.html">
            <div class="camera">${article.camera}</div>
            <div class="title">${article.scenario} — ${article.lighting}</div>
            <div class="meta">${article.difficulty} · Click to view settings</div>
          </a>
        `;
        grid.appendChild(card);
      });
    }

    function filterArticles() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const scenario = document.getElementById('scenarioFilter').value;
      const lighting = document.getElementById('lightingFilter').value;

      const filtered = articles.filter(article => {
        const matchSearch = article.camera.toLowerCase().includes(search) ||
                            article.scenario.toLowerCase().includes(search) ||
                            article.lighting.toLowerCase().includes(search);
        const matchScenario = scenario === '' || article.scenario === scenario;
        const matchLighting = lighting === '' || article.lighting === lighting;
        return matchSearch && matchScenario && matchLighting;
      });

      renderArticles(filtered);
    }

    renderArticles(articles);
  </script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('opToken');
    if (token) {
      // Lock the token into the browser memory for this subdomain session
      localStorage.setItem('operator_uid', token);
    }
  });
</script>
