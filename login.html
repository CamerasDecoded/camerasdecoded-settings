<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cameras Decoded</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #000; background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 24px 24px; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-box { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
    .login-box h1 { font-family: 'Space Mono', monospace; color: #8deb00; margin-bottom: 30px; font-size: 24px; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; color: #b4b4b4; font-size: 14px; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px; background: #0A0A0A; border: 1px solid #2A2A2A; border-radius: 6px; color: #fff; font-family: 'Montserrat', sans-serif; outline: none; }
    .input-group input:focus { border-color: #8deb00; }
    .btn-login { width: 100%; padding: 12px; background: #8deb00; border: none; border-radius: 6px; color: #000; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; margin-top: 10px; }
    .btn-login:hover { opacity: 0.9; transform: scale(1.02); }
    .error-msg { color: #ff4d4d; margin-top: 15px; display: none; font-size: 14px; }
    .back-link { display: block; margin-top: 20px; color: #b4b4b4; font-size: 13px; text-decoration: none; }
    .back-link:hover { color: #8deb00; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>LOGIN</h1>
    <form id="loginForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-login">Access Dashboard</button>
      <div id="errorMsg" class="error-msg">Invalid email or password.</div>
    </form>
    <a href="signup.html" class="back-link">← No account? Sign Up</a>
    <!-- Return to main site -->
    <a href="https://camerasdecoded.com" style="display:block; margin-top: 20px; color: #b4b4b4; font-size: 12px; text-decoration: none; font-family: 'Space Mono', monospace; transition: color 0.2s;">← Return to Cameras Decoded</a>
  </div>
  </div>

  <!-- FIREBASE COMPAT SCRIPTS (Updated to stable version 10.12.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      const firebaseConfig = {
        apiKey: "AIzaSyB95Vx0i8W6WNfUy1N4TNQyfN5xCxQYnz8",
        authDomain: "cameras-decoded.firebaseapp.com",
        projectId: "cameras-decoded",
        storageBucket: "cameras-decoded.firebasestorage.app",
        messagingSenderId: "1088920052790",
        appId: "1:1088920052790:web:2177c1fb31109c1fa02497",
        measurementId: "G-YN3M01WW0B"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const error = document.getElementById('errorMsg');

        auth.signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            error.style.display = 'none';
            const user = userCredential.user;

            // --- FETCH PERMANENT ROLE FROM FIRESTORE ---
            return db.collection('users').doc(user.uid).get();
          })
          .then((doc) => {
            // If we were sent here from a specific page (e.g. "please log in to save"),
            // send the user right back there instead of to their dashboard.
            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get('redirect');
            if (redirectUrl) {
              window.location.href = decodeURIComponent(redirectUrl);
              return;
            }

            if (doc.exists) {
              const userRole = doc.data().role || 'Partner';

              // Redirect to the correct dashboard
              if(userRole === 'Instructor') {
                window.location.href = 'instructor-dashboard.html';
              } else if(userRole === 'Operator') {
                window.location.href = 'operator-dashboard.html';
              } else {
                window.location.href = 'partner-dashboard.html';
              }
            } else {
              alert('User data not found. Please contact support.');
            }
          })
          .catch((err) => {
            error.style.display = 'block';
            error.innerText = err.message;
          });
      });

    });
  </script>
</body>
</html>
