<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Collection — Decoder Atlas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .collection-header { text-align: center; padding: 40px 20px; border-bottom: 1px solid #1A1A1A; margin-bottom: 30px; }
    .collection-header h1 { color: #8deb00; font-family: 'Space Mono', monospace; font-size: 32px; }
    .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .collection-card {
      background: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 8px; padding: 20px;
      transition: 0.2s; text-align: center; display: flex; flex-direction: column; justify-content: space-between;
    }
    .collection-card:hover { border-color: #8deb00; transform: translateY(-2px); }
    .collection-card a.card-main-link { text-decoration: none; color: #ffffff; display: block; flex-grow: 1; }
    .collection-card .camera { color: #8deb00; font-family: 'Space Mono', monospace; font-size: 14px; margin-top: 10px; margin-bottom: 15px; text-transform: uppercase; }
    
    /* Style for the newly added custom Remove button */
    .remove-card-btn {
      background: transparent; border: 1px solid #ff4a4a; color: #ff4a4a;
      font-family: 'Space Mono', monospace; font-size: 11px; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    }
    .remove-card-btn:hover { background: rgba(255, 74, 74, 0.15); box-shadow: 0 0 15px rgba(255, 74, 74, 0.3); }
    
    .back-link { display: block; text-align: center; margin-top: 40px; color: #b4b4b4; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #8deb00; }
    .empty-state { text-align: center; padding: 60px 20px; color: #b4b4b4; font-family: 'Space Mono', monospace; grid-column: 1 / -1; }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="collection-header">
    <h1>🗂️ My Collection</h1>
    <p style="color:#b4b4b4;">Cards you have saved from the Decoder Atlas.</p>
  </div>

  <div id="collectionGrid" class="collection-grid">
    <!-- Cards will be dynamically loaded here by JavaScript -->
    <div class="empty-state">Establishing secure signal link...</div>
  </div>

  <div style="text-align: center;">
    <a href="index.html" class="back-link">← Return to Atlas</a>
    <a href="https://camerasdecoded.com" class="back-link" style="margin-top: 10px;">🖥️ Back to Dashboard</a>
  </div>
</div>

<!-- FIREBASE UTILITY LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  let db; // Global reference placeholder for data operations

  document.addEventListener('DOMContentLoaded', () => {
    const firebaseConfig = {
      apiKey: "AIzaSyB95Vx0i8W6WNfUy1N4TNQyfN5xCxQYnz8",
      authDomain: "cameras-decoded.firebaseapp.com",
      projectId: "cameras-decoded",
      storageBucket: "cameras-decoded.firebasestorage.app",
      messagingSenderId: "1088920052790",
      appId: "1:1088920052790:web:2177c1fb31109c1fa02497",
      measurementId: "G-YN3M01WW0B"
    };
    
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();

    const UID_KEY = 'cameras_decoded_uid';

    // --- AUTH TOKEN BRIDGE ---
    // Safari's ITP blocks the hidden-iframe mechanism Firebase Auth normally
    // uses to share a session across subdomains, so we can't rely on
    // firebase.auth() here. Instead, camerasdecoded.com passes the uid as
    // ?opToken=... on any link into this subdomain; we capture it into this
    // origin's own localStorage and use that as the source of truth.
    const params = new URLSearchParams(window.location.search);
    const token = params.get('opToken');
    if (token) {
      localStorage.setItem(UID_KEY, token);
      params.delete('opToken');
      const cleanUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
      window.history.replaceState({}, '', cleanUrl);
    }

    const uid = localStorage.getItem(UID_KEY);
    if (uid) {
      loadUserCollectionGrid(uid);
    } else {
      document.getElementById('collectionGrid').innerHTML =
        '<div class="empty-state">Access denied. Please log in through the main site to view your collection.</div>';
    }
  });

  // --- RENDERING LOOP ENGINE ---
  function loadUserCollectionGrid(uid) {
    const grid = document.getElementById('collectionGrid');
    
    db.collection('users').doc(uid).get().then((doc) => {
      grid.innerHTML = ''; // Wipe loader text values pristine

      if (doc.exists) {
        const data = doc.data();
        const savedIds = data.savedCards || [];

        if (savedIds.length === 0) {
          grid.innerHTML = '<div class="empty-state">You haven\'t saved any cards yet. Explore the Atlas and click "Save to Collection" on any card.</div>';
          return;
        }

        savedIds.forEach(id => {
          const cardNode = document.createElement('div');
          cardNode.className = 'collection-card';
          cardNode.id = `wrapper-${id}`; // Dynamic targeting id descriptor
          
          // Re-format string keys to pretty text layout formats
          const displayName = id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
          
          cardNode.innerHTML = `
            <a href="${id}.html" class="card-main-link">
              <div style="font-size: 48px; margin-bottom: 10px;">📸</div>
              <div class="camera">${displayName}</div>
            </a>
            <button class="remove-card-btn" onclick="removeCardFromCollection('${id}', '${uid}')">❌ Remove Card</button>
          `;
          grid.appendChild(cardNode);
        });
      } else {
        grid.innerHTML = '<div class="empty-state">Operator account document profile not initialized in database.</div>';
      }
    }).catch((err) => {
      console.error("Collection visualization error trace logs: ", err);
      grid.innerHTML = '<div class="empty-state">Error syncing cloud dataset tracking nodes.</div>';
    });
  }

  // --- THE MASTER DELETION OPERATION ---
  function removeCardFromCollection(cardId, uid) {
    if (!confirm("Are you sure you want to drop this card snapshot from your operator dashboard page?")) {
      return;
    }

    // Atomically removes just this one entry from the array field
    db.collection('users').doc(uid).update({
      savedCards: firebase.firestore.FieldValue.arrayRemove(cardId)
    })
    .then(() => {
      // Success: Animation removal sweep execution from user display view elements
      const activeVisualNode = document.getElementById(`wrapper-${cardId}`);
      if (activeVisualNode) {
        activeVisualNode.remove();
        
        // Double-check element volume count. If empty, write fallback notice
        const remainingBlocks = document.querySelectorAll('.collection-card');
        if (remainingBlocks.length === 0) {
          document.getElementById('collectionGrid').innerHTML = '<div class="empty-state">You haven\'t saved any cards yet. Explore the Atlas and click "Save to Collection" on any card.</div>';
        }
      }
    })
    .catch((error) => {
      console.error("Firestore transaction removal fault event: ", error);
      alert("Could not link data update adjustments to live tracking profile.");
    });
  }
</script>
</body>
</html>
